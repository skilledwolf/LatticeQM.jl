name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        julia-version: ['1.11', '1.12']
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.julia-version }}
      - name: Cache artifacts
        uses: actions/cache@v5
        with:
          path: ~/.julia
          key: ${{ runner.os }}-julia-${{ matrix.julia-version }}-${{ hashFiles('**/Project.toml', '**/Manifest.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia-${{ matrix.julia-version }}-
      - name: Instantiate
        run: julia --project=. --color=yes -e 'using Pkg; Pkg.instantiate()'
      - name: Instantiate test environment
        run: julia --project=test --color=yes -e 'using Pkg; Pkg.develop(path="."); Pkg.instantiate()'
      - name: Run tests (threads=2)
        env:
          JULIA_NUM_THREADS: 2
        run: julia --project=test --check-bounds=yes --color=yes test/runtests.jl
      - name: Run tests (threads=2, procs=2)
        # Pkg.test(julia_args=`--procs=N`) hits a Julia 1.12 precompile bug
        # ("Creating a new global in closed module Main (procs)"), so we
        # invoke runtests.jl directly under --procs to exercise the
        # distributed paths in test_parallelism.jl + the meanfield SCF.
        env:
          JULIA_NUM_THREADS: 2
        run: julia --project=test --procs=2 --check-bounds=yes --color=yes test/runtests.jl
