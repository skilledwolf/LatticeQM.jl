name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        julia-version: ['1.11', '1.12']
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - name: Cache artifacts
        uses: actions/cache@v4
        with:
          path: ~/.julia
          key: ${{ runner.os }}-julia-${{ matrix.julia-version }}-${{ hashFiles('**/Project.toml', '**/Manifest.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia-${{ matrix.julia-version }}-
      - name: Instantiate
        run: julia --project=. --color=yes -e 'using Pkg; Pkg.instantiate()'
      - name: Run tests (threads=2, procs=2)
        # Both JULIA_NUM_THREADS and --procs are required to exercise
        # multimode=:multithreaded and multimode=:distributed paths
        # in the parallelism test set.
        env:
          JULIA_NUM_THREADS: 2
        run: julia --project=. --check-bounds=yes --color=yes -e 'using Pkg; Pkg.test(coverage=true, julia_args=`--procs=2`)'
